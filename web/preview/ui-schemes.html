<!DOCTYPE html>
<html lang="zh-CN" data-scheme="d" class="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>呆呆面板 · 动效 / 美化方案预览</title>
<style>
/* =====================================================================
   呆呆面板 UI 动效预览 —— 3 套方案实时切换
   说明：本文件是「选型预览」，不接入构建。三套方案都保留蓝色品牌与现有布局，
   区别在「动效性格 + 视觉质感」。页面切换一律只用 transform+opacity，不动画 blur，
   从根上规避当前面板切页卡顿问题。
   ===================================================================== */

/* ---------- 基础令牌（明色） ---------- */
:root {
  --brand: #409eff;
  --brand-strong: #2b7fe0;
  --brand-deep: #1d6fd0;
  --brand-soft: #ecf5ff;
  --accent: #36cfc9;

  --bg-page: #f4f6fb;
  --bg-surface: #ffffff;
  --bg-surface-2: #f8fafc;
  --bg-elevated: #ffffff;
  --border: #e6e9f0;
  --border-soft: #eef1f6;

  --text-1: #1f2a3d;
  --text-2: #5a6b85;
  --text-3: #93a0b5;

  --green: #10b981;
  --orange: #f59e0b;
  --red: #ef4444;
  --cyan: #06b6d4;

  --shadow-color: 15, 23, 42;

  /* 动效令牌（被各方案覆盖） */
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
  --dur-fast: 160ms;
  --dur: 240ms;
  --dur-page: 280ms;
  --radius: 14px;
  --radius-sm: 10px;
  --press: 0.985;

  --sans: "Segoe UI", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  --mono: "JetBrains Mono", "Cascadia Code", "Consolas", ui-monospace, monospace;
}

html.dark {
  --bg-page: #0b1120;
  --bg-surface: #131a2a;
  --bg-surface-2: #0f1626;
  --bg-elevated: #18202f;
  --border: #25304a;
  --border-soft: #1d2740;

  --text-1: #e8edf6;
  --text-2: #9aa8c2;
  --text-3: #66748f;

  --brand-soft: #15233c;
  --shadow-color: 0, 0, 0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }

body {
  font-family: var(--sans);
  background: var(--bg-page);
  color: var(--text-1);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background var(--dur) var(--ease-soft), color var(--dur) var(--ease-soft);
}

/* =====================================================================
   方案差异：A 极简通透 / B 沉稳质感 / C 灵动现代
   ===================================================================== */

/* 方案 A · 极简通透 Aurora —— 克制、柔光、留白，缓动 decelerate，切页纯交叉淡入 */
[data-scheme="a"] {
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-soft: cubic-bezier(0.33, 1, 0.68, 1);
  --dur-fast: 150ms;
  --dur: 220ms;
  --dur-page: 240ms;
  --radius: 14px;
  --radius-sm: 10px;
  --press: 0.99;
  --card-shadow: 0 1px 2px rgba(var(--shadow-color), 0.04), 0 6px 20px rgba(var(--shadow-color), 0.05);
  --card-shadow-hover: 0 2px 6px rgba(var(--shadow-color), 0.06), 0 14px 36px rgba(var(--shadow-color), 0.09);
  --lift: -1px;
  --page-anim: aurora-in;
}

/* 方案 B · 沉稳质感 Slate —— 扎实、分层阴影、确定物理反馈，emphasized 弹性，切页方向滑入 */
[data-scheme="b"] {
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
  --dur-fast: 170ms;
  --dur: 260ms;
  --dur-page: 300ms;
  --radius: 9px;
  --radius-sm: 7px;
  --press: 0.97;
  --card-shadow: 0 1px 1px rgba(var(--shadow-color), 0.05), 0 2px 4px rgba(var(--shadow-color), 0.06), 0 8px 16px rgba(var(--shadow-color), 0.05);
  --card-shadow-hover: 0 2px 4px rgba(var(--shadow-color), 0.08), 0 8px 16px rgba(var(--shadow-color), 0.1), 0 18px 36px rgba(var(--shadow-color), 0.1);
  --lift: -2px;
  --page-anim: slate-in;
}

/* 方案 C · 灵动现代 Vivid —— 活泼、渐变光感、微交互密集，spring 弹簧曲线带回弹 */
[data-scheme="c"] {
  --ease: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-soft: cubic-bezier(0.34, 1.4, 0.64, 1);
  --dur-fast: 180ms;
  --dur: 300ms;
  --dur-page: 320ms;
  --radius: 18px;
  --radius-sm: 12px;
  --press: 0.95;
  --card-shadow: 0 2px 8px rgba(64, 158, 255, 0.08), 0 10px 30px rgba(var(--shadow-color), 0.06);
  --card-shadow-hover: 0 6px 16px rgba(64, 158, 255, 0.18), 0 20px 44px rgba(var(--shadow-color), 0.12);
  --lift: -4px;
  --page-anim: vivid-in;
}

/* 方案 D · A+C 混搭 —— A 的丝滑切页+克制底子 + C 的灵动微交互（spring 调柔，偏高级不偏玩具） */
[data-scheme="d"] {
  --ease: cubic-bezier(0.34, 1.32, 0.64, 1);      /* 温和 spring：微交互有轻回弹；切页(aurora 极微缩放)几乎察觉不到 overshoot */
  --ease-soft: cubic-bezier(0.33, 1, 0.68, 1);    /* 颜色/阴影/背景过渡：A 的顺滑 decelerate */
  --dur-fast: 150ms;
  --dur: 230ms;
  --dur-page: 250ms;
  --radius: 15px;
  --radius-sm: 11px;
  --press: 0.96;
  --card-shadow: 0 1px 2px rgba(var(--shadow-color), 0.04), 0 8px 24px rgba(var(--shadow-color), 0.06);
  --card-shadow-hover: 0 2px 6px rgba(var(--shadow-color), 0.06), 0 16px 40px rgba(64, 158, 255, 0.12);
  --lift: -3px;
  --page-anim: aurora-in;   /* 切页用 A 的纯交叉淡入+极微缩放，最丝滑 */
}

/* 方案 D 继承 C 的灵动微交互（弹簧已在 token 里调柔） */
[data-scheme="d"] .stat:hover { border-color: color-mix(in srgb, var(--brand) 30%, var(--border)); }
[data-scheme="d"] .stat:hover .stat__icon { transform: scale(1.08) rotate(-4deg); transition: transform var(--dur) var(--ease); }
[data-scheme="d"] .nav__item:hover:not(.active) { transform: translateX(2px); }
[data-scheme="d"] .nav__item.active::before { box-shadow: 0 0 10px var(--brand); }
[data-scheme="d"] .btn--primary { background: linear-gradient(135deg, var(--brand), var(--accent)); background-size: 160% 160%; }
[data-scheme="d"] .btn--primary:hover { animation: grad 2.4s ease infinite; }
[data-scheme="d"] .hero .bubble { animation: float 7s ease-in-out infinite; }
[data-scheme="d"] .hero .b2 { animation-delay: -3.5s; }
[data-scheme="d"] .chip.running .pulse { animation: pulse 1.4s ease-in-out infinite; }

/* ---------- 顶部控制条 ---------- */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  padding: 12px 22px;
  background: color-mix(in srgb, var(--bg-surface) 86%, transparent);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
.toolbar__brand {
  display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 15px; letter-spacing: 0.3px;
}
.toolbar__logo {
  width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; color: #fff;
  background: linear-gradient(145deg, var(--brand), var(--brand-deep));
  box-shadow: 0 4px 12px rgba(64, 158, 255, 0.35);
}
.toolbar__tag {
  font-size: 11px; font-weight: 600; color: var(--text-3); padding: 2px 8px; border: 1px solid var(--border);
  border-radius: 999px; background: var(--bg-surface-2);
}
.toolbar__spacer { flex: 1 1 auto; }

.scheme-switch { display: inline-flex; gap: 4px; padding: 4px; background: var(--bg-surface-2); border: 1px solid var(--border); border-radius: 12px; }
.scheme-btn {
  border: none; cursor: pointer; background: transparent; color: var(--text-2);
  padding: 7px 14px; border-radius: 9px; font-size: 13px; font-weight: 600; font-family: inherit;
  display: flex; flex-direction: column; align-items: flex-start; line-height: 1.25;
  transition: background var(--dur-fast) var(--ease-soft), color var(--dur-fast) var(--ease-soft), transform var(--dur-fast) var(--ease);
}
.scheme-btn small { font-size: 10.5px; font-weight: 500; color: var(--text-3); }
.scheme-btn:hover { color: var(--text-1); }
.scheme-btn.active {
  background: var(--bg-surface); color: var(--brand);
  box-shadow: 0 1px 3px rgba(var(--shadow-color), 0.12);
}
.scheme-btn.active small { color: color-mix(in srgb, var(--brand) 70%, var(--text-3)); }

.tool-icon-btn {
  width: 38px; height: 38px; border-radius: 11px; border: 1px solid var(--border); background: var(--bg-surface);
  cursor: pointer; color: var(--text-2); display: grid; place-items: center;
  transition: background var(--dur-fast) var(--ease-soft), color var(--dur-fast) var(--ease-soft), transform var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease-soft);
}
.tool-icon-btn:hover { color: var(--brand); border-color: color-mix(in srgb, var(--brand) 45%, var(--border)); transform: translateY(-1px); }
.tool-icon-btn:active { transform: scale(var(--press)); }

.hint { font-size: 12px; color: var(--text-3); }

/* ---------- 面板外壳 ---------- */
.shell {
  margin: 22px;
  height: calc(100vh - 22px - 22px - 63px);
  min-height: 560px;
  display: flex;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(var(--shadow-color), 0.05), 0 24px 60px rgba(var(--shadow-color), 0.08);
}

/* ---------- 侧边栏 ---------- */
.aside {
  width: 224px; flex-shrink: 0; display: flex; flex-direction: column;
  background: var(--bg-surface);
  border-right: 1px solid var(--border-soft);
}
.aside__logo {
  display: flex; align-items: center; gap: 10px; padding: 16px 16px 14px;
  border-bottom: 1px solid var(--border-soft);
}
.aside__logo .mark {
  width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; color: #fff; flex-shrink: 0;
  background: linear-gradient(145deg, var(--brand), var(--brand-deep));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 4px 10px rgba(64,158,255,.25);
}
.aside__logo .name { font-weight: 800; font-size: 15px; }
.aside__logo .ver {
  margin-left: auto; font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--brand-strong);
  padding: 2px 7px; border-radius: 999px; background: var(--brand-soft); border: 1px solid color-mix(in srgb, var(--brand) 18%, transparent);
}
.nav { flex: 1; overflow-y: auto; padding: 10px 10px; }
.nav__label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); padding: 14px 10px 6px; }
.nav__item {
  display: flex; align-items: center; gap: 11px; padding: 0 12px; height: 42px; margin: 2px 0;
  border-radius: var(--radius-sm); color: var(--text-2); cursor: pointer; position: relative; font-weight: 500;
  transition: background var(--dur-fast) var(--ease-soft), color var(--dur-fast) var(--ease-soft), transform var(--dur-fast) var(--ease);
}
.nav__item svg { width: 18px; height: 18px; flex-shrink: 0; }
.nav__item:hover:not(.active) { background: var(--bg-surface-2); color: var(--text-1); }
.nav__item.active { color: var(--brand); font-weight: 600; background: linear-gradient(135deg, color-mix(in srgb, var(--brand) 12%, transparent), color-mix(in srgb, var(--brand) 5%, transparent)); }
.nav__item.active::before { content: ""; position: absolute; left: 0; top: 22%; height: 56%; width: 3px; border-radius: 0 3px 3px 0; background: var(--brand); }

/* 方案差异：导航 hover 行为 */
[data-scheme="b"] .nav__item:hover:not(.active) { transform: translateX(3px); }
[data-scheme="c"] .nav__item { overflow: hidden; }
[data-scheme="c"] .nav__item:hover:not(.active) { transform: translateX(2px); }
[data-scheme="c"] .nav__item.active::before { box-shadow: 0 0 10px var(--brand); }

.aside__user {
  display: flex; align-items: center; gap: 10px; margin: 10px; padding: 9px 11px;
  border-radius: var(--radius-sm); border-top: 1px solid var(--border-soft); cursor: pointer;
  transition: background var(--dur-fast) var(--ease-soft), transform var(--dur-fast) var(--ease);
}
.aside__user:hover { background: var(--bg-surface-2); transform: translateY(-1px); }
.avatar {
  width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; color: #fff; font-weight: 700; flex-shrink: 0;
  background: linear-gradient(135deg, var(--brand), var(--brand-deep));
}
.aside__user .u-name { font-size: 13px; font-weight: 600; }
.aside__user .u-role { font-size: 11px; color: var(--text-3); }

/* ---------- 主区 ---------- */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar {
  height: 60px; flex-shrink: 0; display: flex; align-items: center; gap: 14px; padding: 0 20px;
  border-bottom: 1px solid var(--border-soft); background: var(--bg-surface);
}
.crumb { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-2); padding: 6px 11px; border-radius: 10px; background: var(--bg-surface-2); }
.crumb b { color: var(--text-1); font-weight: 600; }
.crumb .sep { color: var(--text-3); }
.topbar__spacer { flex: 1; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 9px; border: none; background: transparent; cursor: pointer; color: var(--text-2);
  display: grid; place-items: center; position: relative;
  transition: background var(--dur-fast) var(--ease-soft), color var(--dur-fast) var(--ease-soft), transform var(--dur-fast) var(--ease);
}
.icon-btn:hover { background: var(--bg-surface-2); color: var(--brand); transform: translateY(-1px); }
.icon-btn .dot { position: absolute; top: 8px; right: 9px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); border: 1.5px solid var(--bg-surface); }
.top-user { display: flex; align-items: center; gap: 8px; padding: 5px 10px 5px 6px; border-radius: 9px; cursor: pointer; transition: background var(--dur-fast) var(--ease-soft); }
.top-user:hover { background: var(--bg-surface-2); }
.top-user .avatar { width: 28px; height: 28px; border-radius: 8px; font-size: 12px; }
.top-user .nm { font-size: 13px; font-weight: 500; }

.content { flex: 1; min-height: 0; overflow-y: auto; padding: 22px; background: var(--bg-page); }

/* ---------- 页面切换动画（关键，按方案变化） ---------- */
.page { animation: var(--page-anim) var(--dur-page) var(--ease) both; }

@keyframes aurora-in { /* 极简：纯交叉淡入 + 极微缩放，无位移无 blur，最丝滑 */
  from { opacity: 0; transform: scale(0.992); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes slate-in { /* 沉稳：方向性滑入 + 淡入，确定的“翻页感” */
  from { opacity: 0; transform: translate3d(22px, 0, 0); }
  to   { opacity: 1; transform: translate3d(0, 0, 0); }
}
@keyframes vivid-in { /* 灵动：缩放 + 上移 + 弹簧回弹（靠 spring 曲线产生 overshoot） */
  from { opacity: 0; transform: translate3d(0, 14px, 0) scale(0.97); }
  to   { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
}

/* 入场错落：子块依次出现 */
.stagger > * { animation: block-in var(--dur) var(--ease) both; }
.stagger > *:nth-child(1) { animation-delay: 40ms; }
.stagger > *:nth-child(2) { animation-delay: 80ms; }
.stagger > *:nth-child(3) { animation-delay: 120ms; }
.stagger > *:nth-child(4) { animation-delay: 160ms; }
.stagger > *:nth-child(5) { animation-delay: 200ms; }
.stagger > *:nth-child(6) { animation-delay: 240ms; }
@keyframes block-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ---------- 通用卡片 ---------- */
.card {
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  transition: transform var(--dur-fast) var(--ease), box-shadow var(--dur) var(--ease-soft), border-color var(--dur-fast) var(--ease-soft);
}

/* ---------- Hero 横幅 ---------- */
.hero {
  position: relative; overflow: hidden; padding: 24px 26px; border-radius: var(--radius); color: #fff; margin-bottom: 18px;
  background: linear-gradient(120deg, var(--brand-deep), var(--brand) 55%, var(--accent));
  box-shadow: 0 12px 32px rgba(64, 158, 255, 0.28);
}
.hero h2 { font-size: 21px; font-weight: 800; margin-bottom: 6px; }
.hero p { font-size: 13.5px; opacity: 0.9; max-width: 560px; }
.hero .bubble { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.16); }
.hero .b1 { width: 160px; height: 160px; right: -30px; top: -50px; }
.hero .b2 { width: 90px; height: 90px; right: 120px; bottom: -40px; background: rgba(255,255,255,0.1); }
[data-scheme="c"] .hero .bubble { animation: float 6s ease-in-out infinite; }
[data-scheme="c"] .hero .b2 { animation-delay: -3s; }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
.hero__actions { margin-top: 16px; display: flex; gap: 10px; }

/* ---------- 统计卡片 ---------- */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
.stat {
  padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer;
}
.stat__label { font-size: 13px; color: var(--text-2); font-weight: 500; display: flex; align-items: center; gap: 6px; }
.stat__value { font-size: 27px; font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; margin-top: 4px; }
.stat__delta { font-size: 11.5px; font-weight: 600; padding: 1px 7px; border-radius: 6px; display: inline-flex; align-items: center; gap: 2px; margin-top: 8px; }
.stat__delta.up { color: var(--green); background: color-mix(in srgb, var(--green) 12%, transparent); }
.stat__delta.down { color: var(--red); background: color-mix(in srgb, var(--red) 12%, transparent); }
.stat__icon { width: 46px; height: 46px; border-radius: 13px; display: grid; place-items: center; flex-shrink: 0; }
.i-blue { background: color-mix(in srgb, var(--brand) 14%, transparent); color: var(--brand); }
.i-green { background: color-mix(in srgb, var(--green) 14%, transparent); color: var(--green); }
.i-orange { background: color-mix(in srgb, var(--orange) 14%, transparent); color: var(--orange); }
.i-cyan { background: color-mix(in srgb, var(--cyan) 14%, transparent); color: var(--cyan); }
.stat:hover { transform: translateY(var(--lift)); box-shadow: var(--card-shadow-hover); }
[data-scheme="c"] .stat:hover { border-color: color-mix(in srgb, var(--brand) 35%, var(--border)); }
[data-scheme="c"] .stat:hover .stat__icon { transform: scale(1.08) rotate(-4deg); transition: transform var(--dur) var(--ease); }

/* ---------- 表格 ---------- */
.table-card { overflow: hidden; }
.table-head {
  display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border-soft);
}
.table-head h3 { font-size: 15px; font-weight: 700; }
.toolbar-mini { display: flex; gap: 8px; align-items: center; }
.search {
  display: flex; align-items: center; gap: 7px; height: 34px; padding: 0 12px; border-radius: var(--radius-sm);
  background: var(--bg-surface-2); border: 1px solid var(--border); color: var(--text-3); font-size: 13px; min-width: 180px;
  transition: border-color var(--dur-fast) var(--ease-soft), box-shadow var(--dur-fast) var(--ease-soft), background var(--dur-fast) var(--ease-soft);
}
.search:focus-within, .search:hover { border-color: color-mix(in srgb, var(--brand) 50%, var(--border)); box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 12%, transparent); }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 12.5px; font-weight: 600; color: var(--text-2); padding: 11px 18px; background: var(--bg-surface-2); }
td { padding: 13px 18px; font-size: 13.5px; border-top: 1px solid var(--border-soft); }
tbody tr { transition: background var(--dur-fast) var(--ease-soft); }
tbody tr:hover { background: var(--bg-surface-2); }
.cell-task { display: flex; align-items: center; gap: 10px; }
.cell-task .ic { width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center; flex-shrink: 0; background: var(--brand-soft); color: var(--brand); }
.cell-task .nm { font-weight: 600; }
.cell-task .sub { font-size: 11.5px; color: var(--text-3); font-family: var(--mono); }
.chip { display: inline-flex; align-items: center; gap: 5px; padding: 2px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
.chip .pulse { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
[data-scheme="c"] .chip.running .pulse, .chip.running .pulse { animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.6); opacity: 0.5; } }
.chip.success { color: var(--green); background: color-mix(in srgb, var(--green) 12%, transparent); }
.chip.running { color: var(--brand); background: color-mix(in srgb, var(--brand) 12%, transparent); }
.chip.failed { color: var(--red); background: color-mix(in srgb, var(--red) 12%, transparent); }
.chip.idle { color: var(--text-2); background: var(--bg-surface-2); }

/* ---------- 按钮 ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 7px; height: 36px; padding: 0 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-1); font-size: 13.5px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  transition: background var(--dur-fast) var(--ease-soft), border-color var(--dur-fast) var(--ease-soft), color var(--dur-fast) var(--ease-soft), transform 120ms var(--ease), box-shadow var(--dur-fast) var(--ease-soft);
}
.btn svg { width: 16px; height: 16px; }
.btn:hover { border-color: color-mix(in srgb, var(--brand) 45%, var(--border)); color: var(--brand); transform: translateY(-1px); }
.btn:active { transform: scale(var(--press)); }
.btn--primary {
  border: none; color: #fff; position: relative; overflow: hidden;
  background: linear-gradient(135deg, var(--brand), var(--brand-deep));
  box-shadow: 0 4px 12px rgba(64, 158, 255, 0.3);
}
.btn--primary:hover { color: #fff; box-shadow: 0 6px 18px rgba(64, 158, 255, 0.42); }
[data-scheme="c"] .btn--primary { background: linear-gradient(135deg, var(--brand), var(--accent)); background-size: 160% 160%; }
[data-scheme="c"] .btn--primary:hover { animation: grad 2.4s ease infinite; }
@keyframes grad { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
.btn--ghost { background: transparent; }

/* 方案 C：按钮波纹 */
.ripple { position: absolute; border-radius: 50%; transform: scale(0); background: rgba(255,255,255,0.5); pointer-events: none; animation: ripple 0.6s var(--ease-soft); }
@keyframes ripple { to { transform: scale(3.4); opacity: 0; } }

/* ---------- 脚本页（分栏） ---------- */
.split { display: flex; gap: 14px; height: 100%; min-height: 420px; }
.filetree { width: 230px; flex-shrink: 0; padding: 10px; overflow: hidden; }
.filetree .ft-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; font-size: 13px; color: var(--text-2); cursor: pointer; transition: background var(--dur-fast) var(--ease-soft), color var(--dur-fast) var(--ease-soft); }
.filetree .ft-item:hover { background: var(--bg-surface-2); color: var(--text-1); }
.filetree .ft-item.active { background: var(--brand-soft); color: var(--brand); font-weight: 600; }
.filetree .ft-item.indent { padding-left: 26px; }
.editor { flex: 1; min-width: 0; overflow: hidden; display: flex; flex-direction: column; }
.editor__tabs { display: flex; gap: 2px; padding: 8px 10px 0; border-bottom: 1px solid var(--border-soft); }
.editor__tab { padding: 8px 14px; font-size: 13px; border-radius: 8px 8px 0 0; color: var(--text-2); cursor: pointer; }
.editor__tab.active { background: var(--bg-surface-2); color: var(--brand); font-weight: 600; }
.codebox { flex: 1; padding: 16px 18px; font-family: var(--mono); font-size: 13px; line-height: 1.7; background: var(--bg-surface-2); overflow: auto; }
.codebox .ln { color: var(--text-3); display: inline-block; width: 26px; user-select: none; }
.kw { color: #c678dd; } .fn { color: var(--brand); } .str { color: var(--green); } .cm { color: var(--text-3); }

/* ---------- 弹窗 ---------- */
.overlay {
  position: fixed; inset: 0; z-index: 200; display: grid; place-items: center;
  background: rgba(15, 23, 42, 0.34); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  opacity: 0; pointer-events: none; transition: opacity var(--dur) var(--ease-soft);
}
.overlay.show { opacity: 1; pointer-events: auto; }
.dialog {
  width: 440px; max-width: 92vw; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 18px; overflow: hidden;
  box-shadow: 0 30px 70px rgba(var(--shadow-color), 0.3);
  transform: translateY(16px) scale(0.94); opacity: 0;
  transition: transform var(--dur) var(--ease), opacity var(--dur) var(--ease-soft);
}
.overlay.show .dialog { transform: translateY(0) scale(1); opacity: 1; }
.dialog__head { padding: 18px 22px; border-bottom: 1px solid var(--border-soft); font-weight: 700; font-size: 16px; display: flex; align-items: center; justify-content: space-between; }
.dialog__body { padding: 22px; color: var(--text-2); font-size: 14px; }
.dialog__body .field { margin-bottom: 14px; }
.dialog__body label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
.dialog__body input { width: 100%; height: 38px; padding: 0 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-1); font-family: inherit; font-size: 13.5px; outline: none; transition: border-color var(--dur-fast) var(--ease-soft), box-shadow var(--dur-fast) var(--ease-soft); }
.dialog__body input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 14%, transparent); }
.dialog__foot { padding: 14px 22px; border-top: 1px solid var(--border-soft); display: flex; justify-content: flex-end; gap: 10px; }

/* ---------- Loading 演示 ---------- */
.loading-demo { display: flex; align-items: center; gap: 26px; flex-wrap: wrap; }
.spinner { width: 38px; height: 38px; }
.spinner circle.track { stroke: color-mix(in srgb, var(--brand) 16%, transparent); }
.spinner circle.head { stroke: var(--brand); stroke-linecap: round; transform-origin: center; animation: sp-rot 1s linear infinite, sp-dash 1.4s ease-in-out infinite; }
@keyframes sp-rot { to { transform: rotate(360deg); } }
@keyframes sp-dash { 0% { stroke-dasharray: 18 82; stroke-dashoffset: 0; } 50% { stroke-dasharray: 42 58; stroke-dashoffset: -16; } 100% { stroke-dasharray: 18 82; stroke-dashoffset: -52; } }
.dots { display: inline-flex; gap: 7px; }
.dots i { width: 9px; height: 9px; border-radius: 50%; background: var(--brand); display: inline-block; animation: dot 1.1s ease-in-out infinite; }
.dots i:nth-child(2) { animation-delay: 0.13s; } .dots i:nth-child(3) { animation-delay: 0.26s; }
@keyframes dot { 0%,80%,100% { transform: scale(0.7); opacity: 0.35; } 40% { transform: scale(1); opacity: 1; } }
.bar { width: 200px; height: 8px; border-radius: 99px; background: var(--bg-surface-2); overflow: hidden; position: relative; }
.bar i { position: absolute; inset: 0; width: 40%; border-radius: 99px; background: linear-gradient(90deg, var(--brand), var(--accent)); animation: barslide 1.3s var(--ease-soft) infinite; }
@keyframes barslide { 0% { left: -40%; } 100% { left: 100%; } }

.section-title { font-size: 13px; font-weight: 700; color: var(--text-2); margin: 0 0 12px; letter-spacing: 0.02em; }
.demo-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.spacer-lg { height: 18px; }

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

@media (max-width: 980px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .aside { display: none; }
}
</style>

<script>
/* ============ 页面模板 ============ */
const PAGES = {
  dashboard: () => `
    <div class="page" data-key="dashboard">
      <div class="hero">
        <span class="bubble b1"></span><span class="bubble b2"></span>
        <h2>下午好，linzixuanzz 👋</h2>
        <p>今天有 12 个任务等待执行，3 个订阅将在 2 小时后同步。一切运行平稳。</p>
        <div class="hero__actions">
          <button class="btn" style="background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3);color:#fff" data-ripple>查看概览</button>
          <button class="btn" style="background:#fff;border:none;color:var(--brand-deep)" data-ripple>+ 新建任务</button>
        </div>
      </div>
      <div class="stat-grid stagger">
        ${statCard('运行中任务', '12', 'up', '+3', 'i-blue', '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>')}
        ${statCard('今日成功', '248', 'up', '+18%', 'i-green', '<path d="M20 6 9 17l-5-5"/>')}
        ${statCard('失败任务', '3', 'down', '-2', 'i-orange', '<path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/>')}
        ${statCard('脚本总数', '86', 'up', '+5', 'i-cyan', '<path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/>')}
      </div>
      <div class="card table-card">
        <div class="table-head">
          <h3>最近执行</h3>
          <div class="toolbar-mini">
            <div class="search"><svg viewBox="0 0 24 24" width="15" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>搜索任务…</div>
            <button class="btn btn--primary" data-ripple><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>新建</button>
          </div>
        </div>
        <table><thead><tr><th>任务</th><th>状态</th><th>调度</th><th>耗时</th><th>上次执行</th></tr></thead>
        <tbody>${taskRows(5)}</tbody></table>
      </div>
      <div class="spacer-lg"></div>
      <div class="card" style="padding:18px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px">
          <p class="section-title" style="margin:0">加载动效展示 <span style="color:var(--text-3);font-weight:500">（演示用 · 默认持续循环以便看清样式，非卡住）</span></p>
          <button class="btn btn--ghost" id="loadingDemoBtn" data-ripple>▶ 模拟一次加载 → 完成</button>
        </div>
        <div class="loading-demo" id="loadingDemo">
          <svg class="spinner" viewBox="0 0 40 40" fill="none"><circle class="track" cx="20" cy="20" r="15" stroke-width="4"/><circle class="head" cx="20" cy="20" r="15" stroke-width="4"/></svg>
          <span class="dots"><i></i><i></i><i></i></span>

  tasks: () => `

      <div class="card table-card stagger" style="animation:none">
        <div class="table-head">
          <h3>定时任务</h3>
          <div class="toolbar-mini">
            <div class="search"><svg viewBox="0 0 24 24" width="15" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>搜索…</div>

            <button class="btn btn--primary" data-ripple><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>新建任务</button>
          </div>
        </div>
        <table><thead><tr><th>任务</th><th>状态</th><th>调度</th><th>耗时</th><th>上次执行</th></tr></thead>
        <tbody>${taskRows(9)}</tbody></table>
      </div>
    </div>`,

  scripts: () => `
    <div class="page" data-key="scripts">
      <div class="split">
        <div class="card filetree">
          <p class="section-title" style="padding:6px 8px;margin:0">脚本目录</p>
          <div class="ft-item"><svg viewBox="0 0 24 24" width="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>jd_scripts</div>
          <div class="ft-item indent active"><svg viewBox="0 0 24 24" width="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>checkin.py</div>
          <div class="ft-item indent"><svg viewBox="0 0 24 24" width="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>bean.py</div>
          <div class="ft-item"><svg viewBox="0 0 24 24" width="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>tools</div>
          <div class="ft-item indent"><svg viewBox="0 0 24 24" width="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>notify.js</div>
        </div>
        <div class="card editor">
          <div class="editor__tabs"><div class="editor__tab active">checkin.py</div><div class="editor__tab">notify.js</div></div>
          <div class="codebox">
<div><span class="ln">1</span><span class="cm"># 每日签到脚本</span></div>
<div><span class="ln">2</span><span class="kw">import</span> requests, os, time</div>
<div><span class="ln">3</span></div>
<div><span class="ln">4</span><span class="kw">def</span> <span class="fn">checkin</span>(cookie):</div>
<div><span class="ln">5</span>&nbsp;&nbsp;&nbsp;&nbsp;url = <span class="str">"https://api.example.com/sign"</span></div>
<div><span class="ln">6</span>&nbsp;&nbsp;&nbsp;&nbsp;r = requests.<span class="fn">post</span>(url, headers={<span class="str">"Cookie"</span>: cookie})</div>
<div><span class="ln">7</span>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> r.<span class="fn">json</span>()</div>
<div><span class="ln">8</span></div>
<div><span class="ln">9</span><span class="kw">if</span> __name__ == <span class="str">"__main__"</span>:</div>
<div><span class="ln">10</span>&nbsp;&nbsp;&nbsp;&nbsp;<span class="fn">print</span>(<span class="fn">checkin</span>(os.environ[<span class="str">"JD_COOKIE"</span>]))</div>
          </div>
        </div>
      </div>
    </div>`
};

function statCard(label, value, dir, delta, icon, path) {
  return `<div class="card stat">
    <div><div class="stat__label">${label}</div><div class="stat__value">${value}</div>
    <span class="stat__delta ${dir}">${dir==='up'?'▲':'▼'} ${delta}</span></div>
    <span class="stat__icon ${icon}"><svg viewBox="0 0 24 24" width="22" fill="none" stroke="currentColor" stroke-width="2">${path}</svg></span>
  </div>`;
}
function taskRows(n) {
  const data = [
    ['每日签到脚本', 'checkin.py', 'running', '运行中', '0 8 * * *', '1.2s', '2 分钟前'],
    ['京豆收集', 'bean.py', 'success', '成功', '*/30 * * * *', '3.4s', '8 分钟前'],
    ['订阅同步', 'sync.sh', 'success', '成功', '0 */6 * * *', '0.9s', '1 小时前'],
    ['日志清理', 'clean.py', 'idle', '已停用', '0 3 * * *', '—', '昨天'],
    ['余额监控', 'monitor.js', 'failed', '失败', '*/15 * * * *', '5.1s', '12 分钟前'],
    ['天气推送', 'weather.py', 'success', '成功', '0 7 * * *', '2.0s', '5 小时前'],
    ['备份任务', 'backup.sh', 'success', '成功', '0 2 * * *', '14s', '今天 02:00'],
    ['指数抓取', 'index.py', 'running', '运行中', '*/5 * * * *', '0.7s', '刚刚'],
    ['通知测试', 'notify.js', 'idle', '已停用', '@manual', '—', '3 天前'],
  ];
  return data.slice(0, n).map(d => `<tr>
    <td><div class="cell-task"><span class="ic"><svg viewBox="0 0 24 24" width="17" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg></span>
      <div><div class="nm">${d[0]}</div><div class="sub">${d[1]}</div></div></div></td>
    <td><span class="chip ${d[2]}">${d[2]==='running'||d[2]==='success'||d[2]==='failed'?'<span class="pulse"></span>':''}${d[3]}</span></td>
    <td style="font-family:var(--mono);font-size:12.5px;color:var(--text-2)">${d[4]}</td>
    <td>${d[5]}</td><td style="color:var(--text-3)">${d[6]}</td>
  </tr>`).join('');
}

/* ============ 交互逻辑 ============ */
const content = document.getElementById('content');
const crumbTitle = document.getElementById('crumbTitle');
const titles = { dashboard: '仪表板', tasks: '定时任务', scripts: '脚本管理' };

function renderPage(key) {
  content.innerHTML = PAGES[key]();
  crumbTitle.textContent = titles[key] || '仪表板';
  // 重新触发进场动画（让切页动效每次都播放）
  const page = content.firstElementChild;
  if (page) { page.style.animation = 'none'; void page.offsetWidth; page.style.animation = ''; }
}
renderPage('dashboard');

// 侧边栏切页
document.getElementById('nav').addEventListener('click', (e) => {
  const item = e.target.closest('.nav__item');
  if (!item) return;
  document.querySelectorAll('.nav__item').forEach(i => i.classList.remove('active'));
  item.classList.add('active');
  renderPage(item.dataset.page);
});

// 方案切换
document.getElementById('schemeSwitch').addEventListener('click', (e) => {
  const btn = e.target.closest('.scheme-btn');
  if (!btn) return;
  document.querySelectorAll('.scheme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.documentElement.setAttribute('data-scheme', btn.dataset.s);
  // 切方案时重播当前页进场，方便直接对比切页动效
  const page = content.firstElementChild;
  if (page) { page.style.animation = 'none'; void page.offsetWidth; page.style.animation = ''; }
});

// 明暗
document.getElementById('themeBtn').addEventListener('click', () => {
  document.documentElement.classList.toggle('dark');
  document.documentElement.classList.toggle('light');
});

// 重播进场
document.getElementById('replayBtn').addEventListener('click', () => {
  const active = document.querySelector('.nav__item.active');
  renderPage(active ? active.dataset.page : 'dashboard');
});

// 弹窗
const overlay = document.getElementById('overlay');
const openDialog = () => overlay.classList.add('show');
const closeDialog = () => overlay.classList.remove('show');
document.getElementById('dialogBtn').addEventListener('click', openDialog);
document.getElementById('dialogClose').addEventListener('click', closeDialog);
document.getElementById('dialogCancel').addEventListener('click', closeDialog);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeDialog(); });

// 方案 C 波纹（事件委托，仅在灵动方案触发）
document.addEventListener('click', (e) => {
  if (!['c', 'd'].includes(document.documentElement.getAttribute('data-scheme'))) return;
  const target = e.target.closest('[data-ripple]');
  if (!target) return;
  const rect = target.getBoundingClientRect();
  const r = document.createElement('span');
  r.className = 'ripple';
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size + 'px';
  r.style.left = (e.clientX - rect.left - size / 2) + 'px';
  r.style.top = (e.clientY - rect.top - size / 2) + 'px';
  target.appendChild(r);
  setTimeout(() => r.remove(), 600);
});

// 加载 → 完成 演示（事件委托，兼容页面重渲染）
const LOADING_HTML = `
  <svg class="spinner" viewBox="0 0 40 40" fill="none"><circle class="track" cx="20" cy="20" r="15" stroke-width="4"/><circle class="head" cx="20" cy="20" r="15" stroke-width="4"/></svg>
  <span class="dots"><i></i><i></i><i></i></span>
  <span class="bar"><i></i></span>
  <span class="chip running"><span class="pulse"></span>同步中…</span>`;
document.addEventListener('click', (e) => {
  const btn = e.target.closest('#loadingDemoBtn');
  if (!btn) return;
  const box = document.getElementById('loadingDemo');
  if (!box) return;
  box.innerHTML = LOADING_HTML;
  btn.disabled = true; btn.style.opacity = '0.6';
  setTimeout(() => {
    box.innerHTML = `<span class="chip success" style="font-size:13px;padding:6px 14px;animation:block-in .35s var(--ease) both"><svg viewBox="0 0 24 24" width="15" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>加载完成</span>`;
    btn.disabled = false; btn.style.opacity = '';
  }, 1600);
});
</script>
